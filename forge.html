<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Forge</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#anvil{
width:180px;
margin-bottom:20px;
}

h1{
letter-spacing:4px;
font-size:42px;
}

button{
margin-top:40px;
font-size:22px;
padding:18px 50px;
background:#d4af37;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#f2c94c;
}

#flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

</style>

</head>

<body>

<div id="flash"></div>

<img id="anvil" src="anvil.PNG">

<h1>MONEY FORGE</h1>

<button onclick="strike()">STRIKE</button>

<audio id="hammer">
<source src="hammer.mp3" type="audio/mpeg">
</audio>

<script>

function strike(){

document.getElementById("hammer").play();

let flash = document.getElementById("flash");
flash.style.opacity = "0.8";

setTimeout(()=>{
flash.style.opacity="0";
},120);

setTimeout(()=>{
window.location.href="index.html";
},700);

}

</script>

</body>
</html>
