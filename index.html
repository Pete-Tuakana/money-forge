<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money Forge</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #444;
padding:10px;
text-align:left;
}

th{
background:#222;
}

.catBtn{
display:block;
width:100%;
margin:8px 0;
padding:12px;
background:#333;
border:none;
color:white;
font-size:16px;
border-radius:6px;
}

.catBtn:hover{
background:#555;
}
  
</style>

</head>

<body>

<h1>MONEY FORGE</h1>

<input type="file" id="csvFile" accept=".csv">

<div id="forgeBox" style="text-align:center; margin:30px 0;">
<h2 style="font-size:18px; color:#aaa;">FORGEABLE CAPITAL</h2>
<div id="forgeAmount" style="font-size:48px; font-weight:bold;">$0</div>
</div>
  
<table id="transactionTable">

<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Category</th>
<th>Amount</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script src="app.js"></script>
  
<script>

let sessionVendors = {};
let totalIncome = 0;
let totalExpenses = 0;
let survivalCategories = ["Bills", "Groceries", "Fuel"];
let lifestyleCategories = ["Shopping", "Entertainment"];
let wealthCategories = ["Savings", "Income"];  
let survivalTotal = 0;
let lifestyleTotal = 0;
let wealthTotal = 0;  

document.getElementById('csvFile').addEventListener('change', handleFile);

let TARGET_SURVIVAL = 50;
let TARGET_LIFESTYLE = 30;
let TARGET_WEALTH = 20;
  function getStatus(actual, target){

if(actual > target + 2) return "🔴";
if(actual < target - 2) return "🟡";
return "🟢";

}
  
function handleFile(event){

    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = async function(e){

      totalIncome = 0;
      totalExpenses = 0;
      survivalTotal = 0;
      lifestyleTotal = 0;
      wealthTotal = 0;

        const text = e.target.result;
        const rows = text.split("\n");

        const tableBody = document.querySelector("#transactionTable tbody");
        tableBody.innerHTML = "";

        for(const row of rows){

            const cols = row.split(",");
            if(cols.length < 3) continue;

            let date = cols[0].trim();
            let amount = parseFloat(cols[1].replace(/"/g,"").trim());
            let type = amount > 0 ? "income" : "expense";
            let vendor = cleanVendor(cols[2].trim());
            let color = amount > 0 ? "#4CAF50" : "#FF5252";
            let category;

            // get category
            if(sessionVendors[vendor]){
                category = sessionVendors[vendor];
            } else {
                category = await learnVendor(vendor);
                sessionVendors[vendor] = category;
            }

            // survival calc
            // bucket tracking (use absolute values for chart)
          if(survivalCategories.includes(category)){
            survivalTotal += Math.abs(amount);
          }
          else if(lifestyleCategories.includes(category)){
            lifestyleTotal += Math.abs(amount);
          }
          else if(wealthCategories.includes(category)){
            wealthTotal += Math.abs(amount);
          }

            // totals
            if(type === "income"){
                totalIncome += amount;
            } else {
                totalExpenses += amount;
            }

            let tr = document.createElement("tr");

            tr.innerHTML = `
            <td>${date}</td>
            <td>${vendor}</td>
            <td onclick="editCategory('${vendor}')">${category}</td>
            <td style="color:${color}">${amount.toFixed(2)}</td>
            `;

            tableBody.appendChild(tr);
        }

        // ✅ AFTER LOOP (THIS IS THE KEY)
// Forge calc
let forgeableCapital = totalIncome + survivalTotal;

let el = document.getElementById("forgeAmount");
el.style.color = forgeableCapital >= 0 ? "#4CAF50" : "#FF5252";
animateForge(forgeableCapital);

// Pie calculations
let totalSpent = survivalTotal + lifestyleTotal + wealthTotal;

if(totalSpent > 0){

let survivalPct = (survivalTotal / totalSpent) * 100;
let lifestylePct = (lifestyleTotal / totalSpent) * 100;
let wealthPct = (wealthTotal / totalSpent) * 100;

let survivalStatus = getStatus(survivalPct, TARGET_SURVIVAL);
let lifestyleStatus = getStatus(lifestylePct, TARGET_LIFESTYLE);
let wealthStatus = getStatus(wealthPct, TARGET_WEALTH);

document.getElementById("survivalPct").innerText = survivalPct.toFixed(1) + " " + survivalStatus;
document.getElementById("lifestylePct").innerText = lifestylePct.toFixed(1) + " " + lifestyleStatus;
document.getElementById("wealthPct").innerText = wealthPct.toFixed(1) + " " + wealthStatus;

document.getElementById("survivalVal").innerText = survivalTotal.toFixed(0);
document.getElementById("lifestyleVal").innerText = lifestyleTotal.toFixed(0);
document.getElementById("wealthVal").innerText = wealthTotal.toFixed(0);

// draw chart safely
if(typeof drawPieChart === "function"){
drawPieChart(survivalTotal, lifestyleTotal, wealthTotal);
}

}

    // ✅ NOW call this OUTSIDE the onload function
    } // END reader.onload

    reader.readAsText(file);

} // END handleFile

</script>
  
<canvas id="pieChart" width="300" height="300" style="display:block; margin:20px auto;"></canvas>

<div style="text-align:center;">
<p>Survival (50%): <span id="survivalPct"></span>% ($<span id="survivalVal"></span>)</p>
<p>Lifestyle (30%): <span id="lifestylePct"></span>% ($<span id="lifestyleVal"></span>)</p>
<p>Wealth (20%): <span id="wealthPct"></span>% ($<span id="wealthVal"></span>)</p>
</div>
  
<div id="categoryPopup" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#222; padding:20px; border-top:2px solid #444;">

<h3 id="vendorTitle"></h3>

<button class="catBtn">Groceries</button>
<button class="catBtn">Fuel</button>
<button class="catBtn">Bills</button>
<button class="catBtn">Shopping</button>
<button class="catBtn">Entertainment</button>
<button class="catBtn">Savings</button>
<button class="catBtn">Income</button>
<button class="catBtn">Other</button>

</div>
  
</body>
</html>
