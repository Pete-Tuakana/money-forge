<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money Forge</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #444;
padding:10px;
text-align:left;
}

th{
background:#222;
}

.catBtn{
display:block;
width:100%;
margin:8px 0;
padding:12px;
background:#333;
border:none;
color:white;
font-size:16px;
border-radius:6px;
}

.catBtn:hover{
background:#555;
}
  
</style>

</head>

<body>

<h1>MONEY FORGE</h1>

<input type="file" id="csvFile" accept=".csv">

<table id="transactionTable">

<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Category</th>
<th>Amount</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script src="app.js"></script>
  
<script>
let sessionVendors = {};
let totalIncome = 0;
let totalExpenses = 0;
document.getElementById('csvFile').addEventListener('change', handleFile);

function handleFile(event){

const file = event.target.files[0];
const reader = new FileReader();

reader.onload = async function(e){

totalIncome = 0;
totalExpenses = 0;
  
const text = e.target.result;
const rows = text.split("\n");

const tableBody = document.querySelector("#transactionTable tbody");
tableBody.innerHTML = "";

for(const row of rows){

const cols = row.split(",");

if(cols.length < 3) continue;

let date = cols[0].trim();
let amount = parseFloat(cols[1].replace(/"/g,"").trim());
let type = amount > 0 ? "income" : "expense";
let vendor = cleanVendor(cols[2].trim());
let color = amount > 0 ? "#4CAF50" : "#FF5252";
let category;

if(sessionVendors[vendor]){
category = sessionVendors[vendor];
} else {
category = await learnVendor(vendor);
sessionVendors[vendor] = category;
}
  
if(type === "income"){
totalIncome += amount;
} else {
totalExpenses += amount;
}

// Create row FIRST
let tr = document.createElement("tr");

// Only ONE innerHTML
tr.innerHTML = `
<td>${date}</td>
<td>${vendor}</td>
<td onclick="editCategory('${vendor}')">${category}</td>
<td style="color:${color}">${amount.toFixed(2)}</td>
`;

tableBody.appendChild(tr);

console.log("Income:", totalIncome);
console.log("Expenses:", totalExpenses);
console.log("Net:", totalIncome + totalExpenses);
}
};

reader.readAsText(file);

}

</script>
  
<div id="categoryPopup" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#222; padding:20px; border-top:2px solid #444;">

<h3 id="vendorTitle"></h3>

<button class="catBtn">Groceries</button>
<button class="catBtn">Fuel</button>
<button class="catBtn">Bills</button>
<button class="catBtn">Shopping</button>
<button class="catBtn">Entertainment</button>
<button class="catBtn">Savings</button>
<button class="catBtn">Income</button>
<button class="catBtn">Other</button>

</div>
  
</body>
</html>
